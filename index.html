<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <!-- Disable zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Vocabulary</title>

    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --border: #eeeeee;
            --card: #f7f7f7;
        }

        body.dark {
            --bg: #121212;
            --text: #ffffff;
            --border: #2a2a2a;
            --card: #1d1d1d;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 16px;
            font-size: 16px;
            line-height: 2;

            background: var(--bg);
            color: var(--text);

            transition: 0.2s;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .theme-btn {
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;

            background: var(--card);
            color: var(--text);

            font-size: 14px;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 10px;

            border-bottom: 1px solid var(--border);
            padding: 8px 0;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }

        .checked {
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <h1>Vocabulary</h1>

        <button id="themeToggle" class="theme-btn">
            🌙 Dark
        </button>
    </div>

    <div id="list">Loading...</div>

    <script>
        // Theme

        const savedTheme = localStorage.getItem('theme');

        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
        }

        const themeBtn = document.getElementById('themeToggle');

        function updateThemeButton() {
            const isDark =
                document.body.classList.contains('dark');

            themeBtn.textContent =
                isDark ? '☀️ Light' : '🌙 Dark';
        }

        updateThemeButton();

        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark');

            const isDark =
                document.body.classList.contains('dark');

            localStorage.setItem(
                'theme',
                isDark ? 'dark' : 'light'
            );

            updateThemeButton();
        });

        // Words

        async function loadWords() {
            const response = await fetch('words.txt');
            const text = await response.text();

            const lines = text
                .split('\n')
                .filter(line => line.trim());

            const container =
                document.getElementById('list');

            container.innerHTML = lines.map((line, index) => {
                const checked =
                    localStorage.getItem(`word_${index}`) === 'true';

                return `
                <div class="item">
                    <input
                        type="checkbox"
                        id="word_${index}"
                        ${checked ? 'checked' : ''}
                    >

                    <label
                        for="word_${index}"
                        class="${checked ? 'checked' : ''}"
                    >
                        ${line}
                    </label>
                </div>
                `;
            }).join('');

            container.addEventListener('change', (e) => {
                if (e.target.type === 'checkbox') {
                    const checkbox = e.target;

                    localStorage.setItem(
                        checkbox.id,
                        checkbox.checked
                    );

                    const label =
                        checkbox.parentElement.querySelector('label');

                    label.classList.toggle(
                        'checked',
                        checkbox.checked
                    );
                }
            });
        }

        loadWords();
    </script>

</body>

</html>
