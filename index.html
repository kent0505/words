<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <!-- Disable zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Vocabulary</title>

    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --border: #eeeeee;
            --card: #f7f7f7;
        }

        body.dark {
            --bg: #121212;
            --text: #666666;
            --border: #2a2a2a;
            --card: #1d1d1d;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 16px;
            padding-top: 80px;
            font-size: 16px;
            line-height: 2;

            background: var(--bg);
            color: var(--text);

            transition: 0.2s;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;

            padding: 16px;

            background: var(--bg);
            border-bottom: 1px solid var(--border);

            z-index: 1000;
        }

        .tabs {
            display: flex;
            gap: 8px;
        }

        .theme-btn {
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;

            background: var(--card);
            color: var(--text);

            font-size: 14px;
        }

        .tab-btn {
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;

            background: var(--card);
            color: var(--text);

            font-size: 14px;
        }

        .tab-btn.active {
            opacity: 0.6;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }

        .checked {
            opacity: 0.4;
        }
    </style>
</head>

<body>

    <div class="topbar">

        <div class="tabs">
            <button class="tab-btn active" id="allTab">
                All
            </button>

            <button class="tab-btn" id="studyingTab">
                Studying
            </button>
        </div>

        <button id="themeToggle" class="theme-btn">
            🌙 Dark
        </button>
    </div>

    <div id="list">Loading...</div>

    <script>
        // Theme

        const savedTheme = localStorage.getItem('theme');

        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
        }

        const themeBtn = document.getElementById('themeToggle');

        function updateThemeButton() {
            const isDark =
                document.body.classList.contains('dark');

            themeBtn.textContent =
                isDark ? '☀️ Light' : '🌙 Dark';
        }

        updateThemeButton();

        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark');

            const isDark =
                document.body.classList.contains('dark');

            localStorage.setItem(
                'theme',
                isDark ? 'dark' : 'light'
            );

            updateThemeButton();
        });

        // Tabs

        let currentTab = 'all';

        const allTab =
            document.getElementById('allTab');

        const studyingTab =
            document.getElementById('studyingTab');

        allTab.addEventListener('click', () => {
            currentTab = 'all';

            allTab.classList.add('active');
            studyingTab.classList.remove('active');

            renderWords();
        });

        studyingTab.addEventListener('click', () => {
            currentTab = 'studying';

            studyingTab.classList.add('active');
            allTab.classList.remove('active');

            renderWords();
        });

        // Words

        let allWords = [];

        async function loadWords() {
            const response = await fetch('words.txt');
            const text = await response.text();

            allWords = text
                .split('\n')
                .filter(line => line.trim());

            renderWords();
        }

        function renderWords() {
            const container =
                document.getElementById('list');

            let wordsToShow = allWords;

            if (currentTab === 'studying') {
                wordsToShow = allWords.filter((line, index) => {
                    return localStorage.getItem(`word_${index}`) !== 'true';
                });
            }

            container.innerHTML = wordsToShow.map((line) => {

                const originalIndex =
                    allWords.indexOf(line);

                const checked =
                    localStorage.getItem(`word_${originalIndex}`) === 'true';

                return `
                <div class="item">
                    <input
                        type="checkbox"
                        id="word_${originalIndex}"
                        ${checked ? 'checked' : ''}
                    >

                    <label
                        for="word_${originalIndex}"
                        class="${checked ? 'checked' : ''}"
                    >
                        ${line}
                    </label>
                </div>
                `;
            }).join('');

            container.querySelectorAll(
                'input[type="checkbox"]'
            ).forEach((checkbox) => {

                checkbox.addEventListener('change', () => {

                    localStorage.setItem(
                        checkbox.id,
                        checkbox.checked
                    );

                    const label =
                        checkbox.parentElement.querySelector('label');

                    label.classList.toggle(
                        'checked',
                        checkbox.checked
                    );

                    if (currentTab === 'studying') {
                        renderWords();
                    }
                });
            });
        }

        loadWords();
    </script>

</body>

</html>
